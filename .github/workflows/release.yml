name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  cupti-agent:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - cuda_major: 12
            image: nvidia/cuda:12.9.1-devel-ubuntu22.04@sha256:bd4e2680a261c212f1e2fea241606f71497dc67a417f73175d794ec8212b5ba8
          - cuda_major: 13
            image: nvidia/cuda:13.3.0-devel-ubuntu22.04@sha256:cbe2f44080865228de493c496427aa7b414866979fc3bb547e0197e9c31e77bb
    container:
      image: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            binutils build-essential ca-certificates cmake ninja-build
      - name: Build CUDA ${{ matrix.cuda_major }} Agent
        run: |
          cmake -S . -B build/cuda -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DXPROBE_BUILD_BPF=OFF \
            -DXPROBE_BUILD_CUPTI=ON \
            -DXPROBE_REQUIRE_CUPTI=ON \
            -DXPROBE_CUDA_MAJOR=${{ matrix.cuda_major }}
          cmake --build build/cuda --target xprobe-cupti
          dynamic=$(readelf -d build/cuda/cupti/libxprobe-cupti.so)
          grep -F 'Shared library: [libcupti.so.${{ matrix.cuda_major }}]' <<<"${dynamic}"
          if grep -E '\((RPATH|RUNPATH)\)' <<<"${dynamic}"; then
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: xprobe-cupti-cuda${{ matrix.cuda_major }}-linux-x86_64
          path: build/cuda/cupti/libxprobe-cupti.so
          if-no-files-found: error

  linux-x86_64:
    needs: cupti-agent
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf automake autopoint bison build-essential ca-certificates \
            clang curl flex gawk libtool pkg-config python3
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - uses: actions/download-artifact@v4
        with:
          name: xprobe-cupti-cuda12-linux-x86_64
          path: build/cuda12/cupti
      - uses: actions/download-artifact@v4
        with:
          name: xprobe-cupti-cuda13-linux-x86_64
          path: build/cuda13/cupti
      - name: Build release archive
        run: scripts/package-release.sh
      - uses: actions/upload-artifact@v4
        with:
          name: xprobe-linux-x86_64
          path: dist/*.tar.gz*
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz*
          generate_release_notes: true
