name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux-x86_64:
    runs-on: ubuntu-24.04
    container:
      image: nvidia/cuda:13.3.0-devel-ubuntu22.04@sha256:cbe2f44080865228de493c496427aa7b414866979fc3bb547e0197e9c31e77bb
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            autoconf automake autopoint bison build-essential ca-certificates \
            clang cmake curl flex gawk libtool ninja-build pkg-config python3
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: Build release archive
        run: scripts/package-release.sh
      - uses: actions/upload-artifact@v4
        with:
          name: xprobe-linux-x86_64
          path: dist/*.tar.gz*
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz*
          generate_release_notes: true
