name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - uses: taiki-e/install-action@just
      - name: Install native build tools
        run: sudo apt-get update && sudo apt-get install -y autopoint clang cmake ninja-build
      - run: just fmt-check
      - run: just lint
      - run: just test

